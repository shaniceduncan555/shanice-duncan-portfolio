Replace your entire first `<script>` block in the `<head>` with this:

```html
<script>
function showPage(page) {
  document.querySelectorAll('.page').forEach(function(p) {
    p.classList.remove('active');
  });

  var el = document.getElementById('page-' + page);
  if (el) el.classList.add('active');

  window.scrollTo({ top: 0, behavior: 'smooth' });

  var nav = document.getElementById('navLinks');
  if (nav) nav.classList.remove('open');

  setTimeout(function() {
    document.querySelectorAll('.fade-in').forEach(function(item) {
      if (item.getBoundingClientRect().top < window.innerHeight - 40) {
        item.classList.add('visible');
      } else {
        item.classList.remove('visible');
      }
    });
  }, 100);

  return false;
}

function toggleNav() {
  var nav = document.getElementById('navLinks');
  if (nav) nav.classList.toggle('open');
}

function openModal(id) {
  var m = document.getElementById(id);
  if (!m) return;
  m.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  requestAnimationFrame(function() {
    m.classList.add('open');
  });
}

function closeModal(id) {
  var m = document.getElementById(id);
  if (!m) return;
  m.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(function() {
    m.style.display = 'none';
  }, 300);
}

function closeModalOutside(e) {
  if (e.target === e.currentTarget) {
    e.currentTarget.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(function() {
      e.currentTarget.style.display = 'none';
    }, 300);
  }
}

function scrollWork(direction) {
  var container = document.getElementById('workScroll');
  if (container) {
    container.scrollBy({
      left: direction * 370,
      behavior: 'smooth'
    });
  }
}
</script>
```
